name: Nexum Altivon CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'NexumAltivon_Back-End/**'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'NexumAltivon_Back-End/**'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22'
  PROJECT_PATH: 'NexumAltivon_Back-End/NexumAltivon.API.csproj'
  FRONTEND_PATH: 'NexumAltivon_Front-End'
  REGISTRY: ghcr.io
  API_IMAGE_NAME: corporativogna-lrc/grupo-nexum-altivon-ltda-m-api
  FRONTEND_IMAGE_NAME: corporativogna-lrc/grupo-nexum-altivon-ltda-m-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  api-build:
    runs-on: ubuntu-latest
    name: API Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API artifact
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish-api --no-build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish-api

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_PATH }}/build

  docker-build-api:
    runs-on: ubuntu-latest
    needs: api-build
    name: Docker API

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect GHCR publishing
        id: ghcr
        run: |
          if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: API image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ steps.ghcr.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish status
        if: steps.ghcr.outputs.enabled != 'true'
        run: echo "GHCR_USERNAME/GHCR_TOKEN não configurados. Build executado sem push para o registro."

  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: frontend-build
    name: Docker Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect GHCR publishing
        id: ghcr
        run: |
          if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: ${{ steps.ghcr.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish status
        if: steps.ghcr.outputs.enabled != 'true'
        run: echo "GHCR_USERNAME/GHCR_TOKEN não configurados. Build executado sem push para o registro."

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-frontend]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop'
    name: Deploy Staging
    environment: staging
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}

    steps:
      - name: Check staging SSH configuration
        id: deploy_config
        run: |
          if [ -n "$STAGING_HOST" ] && [ -n "$STAGING_USER" ] && [ -n "$STAGING_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "STAGING_HOST/STAGING_USER/STAGING_SSH_KEY não configurados. Deploy externo ignorado."
          fi

      - name: Deploy to staging server
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/nexumaltivon/staging
            git pull --ff-only
            if docker compose version >/dev/null 2>&1; then COMPOSE="docker compose"; else COMPOSE="docker-compose"; fi
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env pull
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env up -d
            docker system prune -f

  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-frontend]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    name: Deploy Production
    environment: production
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

    steps:
      - name: Check production SSH configuration
        id: deploy_config
        run: |
          if [ -n "$PROD_HOST" ] && [ -n "$PROD_USER" ] && [ -n "$PROD_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "PROD_HOST/PROD_USER/PROD_SSH_KEY não configurados. Deploy externo ignorado."
          fi

      - name: Deploy to production server
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/nexumaltivon/production
            git pull --ff-only
            if docker compose version >/dev/null 2>&1; then COMPOSE="docker compose"; else COMPOSE="docker-compose"; fi
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env pull
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env up -d
            docker system prune -f

