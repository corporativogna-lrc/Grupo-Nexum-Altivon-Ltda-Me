name: Nexum Altivon CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'NexumAltivon_Back-End/**'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'NexumAltivon_Back-End/**'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  PROJECT_PATH: 'NexumAltivon_Back-End/NexumAltivon.API.csproj'
  FRONTEND_PATH: 'NexumAltivon_Front-End'
  REGISTRY: ghcr.io
  API_IMAGE_NAME: corporativogna-lrc/grupo-nexum-altivon-ltda-m-api
  FRONTEND_IMAGE_NAME: corporativogna-lrc/grupo-nexum-altivon-ltda-m-frontend

jobs:
  api-build:
    runs-on: ubuntu-latest
    name: API Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API artifact
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish-api --no-build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish-api

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build
        env:
          REACT_APP_BACKEND_URL: https://api.nexumaltivon.com

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_PATH }}/build

  docker-build-api:
    runs-on: ubuntu-latest
    needs: api-build
    name: Docker API

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: frontend-build
    name: Docker Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_BACKEND_URL=https://api.nexumaltivon.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-frontend]
    if: github.ref == 'refs/heads/develop'
    name: Deploy Staging
    environment: staging

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/nexumaltivon/staging
            git pull --ff-only
            if docker compose version >/dev/null 2>&1; then COMPOSE="docker compose"; else COMPOSE="docker-compose"; fi
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env pull
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env up -d
            docker system prune -f

  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-frontend]
    if: github.ref == 'refs/heads/main'
    name: Deploy Production
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/nexumaltivon/production
            git pull --ff-only
            if docker compose version >/dev/null 2>&1; then COMPOSE="docker compose"; else COMPOSE="docker-compose"; fi
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env pull
            $COMPOSE -f docker/docker-compose.prod.yml --env-file .env up -d
            docker system prune -f
