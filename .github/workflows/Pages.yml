name: Nexum 2026-06-28 - Deploy Operacional Oficial .com.br

run-name: Nexum .com.br oficial | commit ${{ github.sha }} | ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - 'NexumAltivon_Front-End/**'
      - '.github/workflows/Pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SITE_URL: https://nexumaltivon.com.br
  API_URL: https://api.nexumaltivon.com.br
  OPERACAO_LABEL: "Nexum Altivon .com.br oficial 2026-06-28"

jobs:
  build:
    runs-on: ubuntu-latest
    name: 01 - Construir site oficial .com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: NexumAltivon_Front-End/package-lock.json

      - name: Instalar dependencias
        working-directory: NexumAltivon_Front-End
        run: npm ci

      - name: Construir site
        working-directory: NexumAltivon_Front-End
        run: npm run build
        env:
          CI: false
          PUBLIC_URL: /

      - name: Fixar runtime oficial da API
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const runtime = {
            apiUrl: process.env.API_URL,
            apiUrls: [process.env.API_URL],
            updatedAt: new Date().toISOString(),
            source: 'github-pages-oficial-com-br',
            commit: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID
          };
          fs.writeFileSync(
            'NexumAltivon_Front-End/build/api-runtime.json',
            JSON.stringify(runtime, null, 2) + '\n',
            'utf8'
          );
          NODE

      - name: Configurar dominio customizado
        run: echo "nexumaltivon.com.br" > NexumAltivon_Front-End/build/CNAME

      - name: Registrar versao operacional no resumo
        run: |
          {
            echo "## $OPERACAO_LABEL"
            echo ""
            echo "- Commit publicado: \`$GITHUB_SHA\`"
            echo "- Front oficial: $SITE_URL"
            echo "- API oficial: $API_URL"
            echo "- Runtime permitido: somente \`https://api.nexumaltivon.com.br\`"
            echo "- Fonte operacional: dados reais da API e banco; mocks de vitrine/admin removidos"
            echo "- Caminhos temporarios \`trycloudflare.com\`: proibidos nesta publicacao"
            echo "- Dominio legado \`.com\`: deve operar apenas como redirecionamento 301 para \`.com.br\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: NexumAltivon_Front-End/build

  deploy:
    runs-on: ubuntu-latest
    name: 02 - Publicar GitHub Pages oficial
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validar-operacao:
    runs-on: ubuntu-latest
    name: 03 - Validar operacao publicada
    needs: deploy

    steps:
      - name: Validar site, runtime e API oficial
        run: |
          set -euo pipefail

          echo "Validando site oficial: $SITE_URL"
          curl -fsSI "$SITE_URL" >/dev/null

          echo "Validando runtime publico sem tunnel temporario"
          runtime="$(curl -fsSL "$SITE_URL/api-runtime.json?run=$GITHUB_RUN_ID")"
          echo "$runtime"
          runtime_api_url="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); const url=data.apiUrl || data.api_url || data.url; if(!url){process.exit(2)}; console.log(String(url).replace(/\/+$/, ''));" <<< "$runtime")"
          if [ "$runtime_api_url" != "$API_URL" ]; then
            echo "ERRO: runtime aponta para '$runtime_api_url', esperado '$API_URL'"
            exit 1
          fi
          node -e "const fs=require('fs'); const text=fs.readFileSync(0,'utf8'); if(/trycloudflare\\.com/i.test(text)){process.exit(1)}" <<< "$runtime"

          echo "Validando API oficial: $API_URL"
          check_api() {
            local path="$1"
            local label="$2"
            local tentativa
            for tentativa in 1 2 3 4 5; do
              if curl -fsSL --connect-timeout 10 --max-time 30 "$API_URL$path" >/tmp/nexum-api-check.out; then
                cat /tmp/nexum-api-check.out
                return 0
              fi
              echo "Tentativa $tentativa falhou para $label; nova tentativa em 8s"
              sleep 8
            done
            return 1
          }

          api_status="OK"
          if ! check_api "/health" "/health"; then
            api_status="FALHA /health"
          elif ! check_api "/health/db" "/health/db"; then
            api_status="FALHA /health/db"
          elif ! check_api "/api/produtos/destaques" "/api/produtos/destaques" >/dev/null; then
            api_status="FALHA /api/produtos/destaques"
          fi

          {
            echo "## Operacao validada"
            echo ""
            echo "- Site: $SITE_URL"
            echo "- API: $API_URL"
            echo "- Runtime API: $runtime_api_url"
            echo "- Saude da API: $api_status"
            echo "- Commit 100% operacional: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$api_status" != "OK" ]; then
            echo "::warning::GitHub Pages publicado, mas a API oficial falhou na validacao pos-deploy: $api_status"
          fi

