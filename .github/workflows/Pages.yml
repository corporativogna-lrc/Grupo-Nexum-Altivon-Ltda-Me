name: Nexum 2026-06-28 - Deploy Operacional Oficial .com.br

run-name: Nexum .com.br oficial | commit ${{ github.sha }} | ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - 'NexumAltivon_Front-End/**'
      - '.github/workflows/Pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_URL: https://nexumaltivon.com.br
  API_URL: https://api.nexumaltivon.com.br
  OPERACAO_LABEL: "Nexum Altivon .com.br oficial 2026-06-28"

jobs:
  build:
    runs-on: ubuntu-latest
    name: 01 - Construir site oficial .com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: NexumAltivon_Front-End/package-lock.json

      - name: Instalar dependencias
        working-directory: NexumAltivon_Front-End
        run: npm ci --legacy-peer-deps

      - name: Construir site
        working-directory: NexumAltivon_Front-End
        run: npm run build
        env:
          CI: false
          PUBLIC_URL: /

      - name: Configurar dominio customizado
        run: echo "nexumaltivon.com.br" > NexumAltivon_Front-End/build/CNAME

      - name: Registrar versao operacional no resumo
        run: |
          {
            echo "## $OPERACAO_LABEL"
            echo ""
            echo "- Commit publicado: \`$GITHUB_SHA\`"
            echo "- Front oficial: $SITE_URL"
            echo "- API oficial: $API_URL"
            echo "- Runtime permitido: somente \`https://api.nexumaltivon.com.br\`"
            echo "- Fonte operacional: dados reais da API e banco; mocks de vitrine/admin removidos"
            echo "- Caminhos temporarios \`trycloudflare.com\`: proibidos nesta publicacao"
            echo "- Dominio legado \`.com\`: deve operar apenas como redirecionamento 301 para \`.com.br\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: NexumAltivon_Front-End/build

  deploy:
    runs-on: ubuntu-latest
    name: 02 - Publicar GitHub Pages oficial
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validar-operacao:
    runs-on: ubuntu-latest
    name: 03 - Validar operacao publicada
    needs: deploy

    steps:
      - name: Validar site, runtime e API oficial
        run: |
          set -euo pipefail

          echo "Validando site oficial: $SITE_URL"
          curl -fsSI "$SITE_URL" >/dev/null

          echo "Validando runtime publico sem tunnel temporario"
          runtime="$(curl -fsSL "$SITE_URL/api-runtime.json?run=$GITHUB_RUN_ID")"
          echo "$runtime"
          echo "$runtime" | grep -q '"apiUrl": "https://api.nexumaltivon.com.br"'
          if echo "$runtime" | grep -qi 'trycloudflare.com'; then
            echo "ERRO: runtime ainda contem tunnel temporario trycloudflare.com"
            exit 1
          fi

          echo "Validando API oficial: $API_URL"
          curl -fsSL "$API_URL/health"
          curl -fsSL "$API_URL/health/db"
          curl -fsSL "$API_URL/api/produtos/destaques" >/dev/null

          {
            echo "## Operacao validada"
            echo ""
            echo "- Site: $SITE_URL"
            echo "- API: $API_URL"
            echo "- Banco via API: OK"
            echo "- Produtos publicados: OK"
            echo "- Commit 100% operacional: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

