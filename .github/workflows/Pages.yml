name: Publicar site no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'NexumAltivon_Front-End/**'
      - '.github/workflows/Pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Construir site funcional

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: NexumAltivon_Front-End/package-lock.json

      - name: Instalar dependencias
        working-directory: NexumAltivon_Front-End
        run: npm ci --legacy-peer-deps

      - name: Construir site
        working-directory: NexumAltivon_Front-End
        run: npm run build
        env:
          CI: false
          PUBLIC_URL: /
          REACT_APP_BACKEND_URL: https://herald-syndication-convicted-salad.trycloudflare.com

      - name: Configurar dominio customizado
        run: echo "www.nexumaltivon.com" > NexumAltivon_Front-End/build/CNAME

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: NexumAltivon_Front-End/build

  deploy:
    runs-on: ubuntu-latest
    name: Publicar no Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

