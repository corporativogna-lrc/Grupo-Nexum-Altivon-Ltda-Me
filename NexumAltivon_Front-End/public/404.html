<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>Nexum Altivon</title>
    <meta
      name="description"
      content="Redirecionando para a pagina solicitada..."
    />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into
      // just a query string, and then redirects the browser to the new url with only a
      // query string and hash fragment.
      //
      // For a custom domain (www.nexumaltivon.com.br), keep segmentCount = 0.
      //
      // Note: This file should be at least 512 bytes for GitHub Pages to serve it.
      var segmentCount = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          l.pathname
            .split('/')
            .slice(1 + segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body>
    <noscript>Habilite JavaScript para acessar a Nexum Altivon.</noscript>
    <p>Redirecionando...</p>
    <!-- Padding to exceed 512 bytes for GitHub Pages -->
    <!-- ................................................................ -->
    <!-- ................................................................ -->
    <!-- ................................................................ -->
    <!-- ................................................................ -->
    <!-- ................................................................ -->
    <!-- ................................................................ -->
  </body>
</html>
