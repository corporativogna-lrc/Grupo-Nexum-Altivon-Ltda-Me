<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmar cadastro - Nexum Altivon</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1b1b1b, #050505 68%);
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    main {
      width: min(92vw, 640px);
      background: rgba(12, 12, 12, 0.92);
      border: 1px solid rgba(201, 162, 39, 0.28);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
    }
    h1 {
      margin-top: 0;
      color: #c9a227;
    }
    .muted { color: #cfcfcf; line-height: 1.6; }
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 24px;
    }
    a.button {
      display: inline-block;
      margin-top: 22px;
      background: #c9a227;
      color: #0a0a0a;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 999px;
    }
    code { word-break: break-all; }
  </style>
</head>
<body>
  <main>
    <h1>Confirmação de cadastro</h1>
    <p class="muted">Estamos validando seu cadastro para liberar o acesso à área do cliente.</p>
    <div id="status" class="status">Lendo token de confirmação...</div>
    <a id="loginLink" class="button" href="/login" style="display:none;">Ir para o login</a>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const loginLink = document.getElementById('loginLink');

    const normalizeBase = (value) => String(value || '').trim().replace(/\/+$/, '');
    const resolveApiBase = async () => {
      try {
        const runtime = await fetch('/api-runtime.json?ts=' + Date.now(), { cache: 'no-store' });
        if (runtime.ok) {
          const data = await runtime.json();
          const apiUrl = data.apiUrl || data.api_url || data.url;
          if (apiUrl) return normalizeBase(apiUrl);
        }
      } catch (_) {}

      const origin = window.location.origin;
      if (origin.includes('127.0.0.1') || origin.includes('localhost')) {
        return 'http://localhost:5000';
      }
      return origin;
    };

    (async () => {
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        statusEl.textContent = 'Token ausente. Verifique o link enviado por e-mail.';
        loginLink.style.display = 'inline-block';
        return;
      }

      try {
        const apiBase = await resolveApiBase();
        const response = await fetch(`${apiBase}/api/clientes/confirmar?token=${encodeURIComponent(token)}`, {
          headers: { Accept: 'application/json' }
        });
        const payload = await response.json();
        const message = payload?.mensagem || payload?.Mensagem || payload?.detail || 'Cadastro confirmado com sucesso.';

        if (!response.ok || payload?.sucesso === false || payload?.Sucesso === false) {
          throw new Error(message);
        }

        statusEl.textContent = message;
        loginLink.style.display = 'inline-block';
      } catch (error) {
        statusEl.textContent = error.message || 'Não foi possível confirmar o cadastro agora.';
        loginLink.style.display = 'inline-block';
      }
    })();
  </script>
</body>
</html>
